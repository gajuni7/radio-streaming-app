<!-- Video de fondo -->
<ion-content class="ion-padding radio-content">
  <video autoplay muted loop class="background-video">
    <source src="assets/video/background-video.mp4" type="video/mp4" />
  </video>
  <div class="radio-container">
    <!-- Logo y título de la emisora -->
    <div class="station-info">
      <div class="logo-container">
        <img
          [src]="stationInfo.logo"
          [alt]="stationInfo.name + ' Logo'"
          class="station-logo"
        />
      </div>
    </div>

    <!-- Reproductor de audio reorganizado -->
    <div class="player-section">
      <div *ngIf="showStatus" class="status-indicator">
        @if (isPlaying) {
        <div class="live-indicator">
          <span class="pulse-dot"></span>
          <span class="live-text">EN VIVO</span>
        </div>
        } @else {
        <div class="offline-indicator">
          <span class="offline-text">DESCONECTADO</span>
        </div>
        }
      </div>

      <!-- Botón play central con solo ondas -->
      <div class="player-center">
        <div class="sound-waves" [class.active]="isPlaying">
          <div class="wave wave-1"></div>
          <div class="wave wave-2"></div>
          <div class="wave wave-3"></div>
        </div>

        <ion-button
          fill="clear"
          size="default"
          (click)="togglePlay()"
          class="main-play-button"
        >
          <ion-icon
            [name]="isPlaying ? 'pause' : 'play'"
            slot="icon-only"
          ></ion-icon>
        </ion-button>
      </div>

      <div class="now-playing-inline" *ngIf="isPlaying">
        <p class="song-title-inline">
          <ion-icon name="musical-notes" class="music-icon"></ion-icon>
          <span class="separator"> ... </span>
          <span *ngIf="currentSong.artist">{{ currentSong.artist }} - </span
          >{{ currentSong.title }}
          <span class="separator"> ... </span>
          <ion-icon name="musical-notes" class="music-icon"></ion-icon>
        </p>
      </div>

      <!-- Ecualizador horizontal arriba -->
      <div class="horizontal-equalizer" [class.active]="isPlaying">
        <div
          *ngFor="let bar of hzBars"
          class="hz-bar"
          [style.--height]="bar.height"
          [style.--delay]="bar.delay"
        ></div>
      </div>

      <!-- Control de volumen compacto -->
      <div *ngIf="showVolumeControl" class="volume-control">
        <div class="volume-container">
          <ion-icon name="volume-low" class="volume-icon"></ion-icon>

          <div class="volume-center">
            <!-- <div class="now-playing-inline" *ngIf="isPlaying">
              <p class="song-title-inline">
                <ion-icon name="musical-notes" class="music-icon"></ion-icon>
                <span class="separator"> ... </span>
                <span *ngIf="currentSong.artist"
                  >{{ currentSong.artist }} - </span
                >{{ currentSong.title }}
                <span class="separator"> ... </span>
                <ion-icon name="musical-notes" class="music-icon"></ion-icon>
              </p>
            </div> -->
            <ion-range
              [(ngModel)]="volume"
              (ionInput)="onVolumeChange($event)"
              min="0"
              max="100"
              pin="true"
              class="volume-slider"
            >
            </ion-range>
          </div>

          <ion-icon name="volume-high" class="volume-icon"></ion-icon>
        </div>
      </div>
    </div>
  </div>
</ion-content>

<ion-footer>
  <!-- Redes sociales -->
  <div class="social-section">
    <div class="social-buttons">
      <ion-button
        fill="outline"
        (click)="openSocial('facebook')"
        class="social-btn facebook"
      >
        <ion-icon name="logo-facebook" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button
        fill="outline"
        (click)="openSocial('instagram')"
        class="social-btn instagram"
      >
        <ion-icon name="logo-instagram" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button
        fill="outline"
        (click)="openSocial('whatsapp')"
        class="social-btn whatsapp"
      >
        <ion-icon name="logo-whatsapp" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button
        fill="outline"
        (click)="openSocial('tiktok')"
        class="social-btn tiktok"
      >
        <ion-icon name="logo-tiktok" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button
        fill="outline"
        (click)="openSocial('youtube')"
        class="social-btn youtube"
      >
        <ion-icon name="logo-youtube" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button
        fill="outline"
        (click)="openSocial('homepage')"
        class="social-btn homepage"
      >
        <ion-icon name="globe" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button
        fill="outline"
        (click)="openSocial('live')"
        class="social-btn videocam"
      >
        <ion-icon name="videocam" slot="icon-only"></ion-icon>
      </ion-button>
    </div>
  </div>
</ion-footer>
